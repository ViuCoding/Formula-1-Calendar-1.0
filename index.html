<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 1.0</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>





  <section id="bahrain">
    <div class="race-main-container">
      <div class="year-round">
        <p class="year">2022</p>
        <p class="round">ROUND 1</p>
      </div>

      <div class="divider" style="background-color: red;"></div>

      <div class="track-container">
        <p class="track-name">Bahrain International Circuit</p>
        <img src="./tracks/1-Bahrain.png" alt="" class="track-img" style="width: 180px;" />
        <p class="first-gp">First GP 2004</p>
        <p class="laps">57 Laps 5.412km</p>
        <p class="winner">Last Winner L.Hamilton</p>
      </div>

      <div class="divider" style="background-color: red;"></div>

      <footer class="footer-flex">
        <div class="grand-prix">
          <p class="nation">BAHRAIN</p>
          <p class="gp-name">GRAND PRIX</p>
        </div>

        <div class="flag">
          <img src="./flags/Bahrain.jpg" alt="" class="flag-img" style="border: .5px solid black">
        </div>
      </footer>
    </div>
  </section>
  <section id="monza">
    <div class="race-main-container">
      <div class="year-round">
        <p class="year">2022</p>
        <p class="round">ROUND 16</p>
      </div>

      <div class="divider"></div>

      <div class="track-container">
        <p class="track-name">Autodromo Nazionale Monza</p>
        <img src="./tracks/16-Monza.png" alt="" class="track-img" />
        <p class="first-gp">First GP 1950</p>
        <p class="laps">53 Laps 5.793km</p>
        <p class="winner">Last Winner D.Ricciardo</p>
      </div>

      <div class="divider"></div>

      <footer class="footer-flex">
        <div class="grand-prix">
          <p class="nation">ITALIAN</p>
          <p class="gp-name">GRAND PRIX</p>
        </div>
        <div class="flag">
          <img src="./flags/Italy.png" alt="" class="flag-img">
        </div>
      </footer>
    </div>
  </section>









</html>
